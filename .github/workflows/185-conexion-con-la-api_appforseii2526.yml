# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - appforseii2526

on:
  push:
    branches:
      - 185-conexion-con-la-api
      #-development
      #paths:
      #-'src/AppForSEII2526.API**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build ./src/AppForSEII2526.API/AppForSEII2526.API.csproj --configuration Release


      - name: dotnet publish
        run: dotnet publish ./src/AppForSEII2526.API/AppForSEII2526.API.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"


      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BE6558F2467B4D23870EE049C179620A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0EB3A88459CB454AB30BEF823A598510 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2A81B9E5B5AA46C78420AD90AABC16D6 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'appforseii2526'
          slot-name: 'Production'
          package: .

          
